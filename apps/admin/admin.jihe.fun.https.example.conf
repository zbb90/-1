# 生产环境 Nginx 示例：HTTPS 反代到本机 Next（Docker/Podman 监听 127.0.0.1:3003）
#
# 使用前：
# 1. 用 certbot 或阿里云证书部署 fullchain.pem / privkey.pem，并修改下面路径
# 2. 安全组放行 80、443
# 3. 校验：curl -sI https://admin.jihe.fun/api/health
#
# 若仓库里仅有 listen 80 的配置而客户端访问 https://，会出现 net::ERR_CONNECTION_CLOSED。

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.jihe.fun;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.jihe.fun;

    ssl_certificate     /etc/letsencrypt/live/admin.jihe.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.jihe.fun/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }
}
