name: CI / CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: Lint admin
        run: npm run lint:admin

      - name: Test admin
        run: npm run test

      - name: Verify semantic regression cases
        run: npm run verify:semantic-cases

      - name: Build admin
        run: npm run build:admin

  deploy:
    needs: admin
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.ECS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync code to ECS
        run: |
          APP_DIR="${{ secrets.ECS_APP_DIR }}"
          ssh "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}" "mkdir -p \"$APP_DIR\""
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            -czf - . \
            | ssh "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}" "tar -xzf - -C \"$APP_DIR\""

      - name: Deploy to ECS
        run: |
          APP_DIR="${{ secrets.ECS_APP_DIR }}"
          ssh "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}" "set -e
            cd \"$APP_DIR\"

            if [ \"\$(id -u)\" = '0' ]; then
              SUDO=''
            else
              SUDO='sudo'
            fi

            echo '>>> Tagging current image as rollback...'
            podman tag audit-admin:latest audit-admin:rollback 2>/dev/null || true

            echo '>>> Building new image...'
            podman build -t audit-admin:latest -f apps/admin/Dockerfile .

            echo '>>> Ensuring Redis is installed...'
            if ! command -v redis-server >/dev/null 2>&1; then
              if command -v yum >/dev/null 2>&1; then
                \$SUDO yum install -y redis
              elif command -v apt-get >/dev/null 2>&1; then
                \$SUDO apt-get update
                \$SUDO apt-get install -y redis-server
              else
                echo 'No supported package manager found for Redis install'
                exit 1
              fi
            fi

            echo '>>> Starting Redis...'
            \$SUDO systemctl enable redis || \$SUDO systemctl enable redis-server || true
            \$SUDO systemctl start redis || \$SUDO systemctl start redis-server || true

            echo '>>> Updating runtime env...'
            ENV_FILE=/root/audit-admin.env
            if [ -f \"\$ENV_FILE\" ]; then
              \$SUDO sed -i '/^KV_REST_API_URL=/d' \"\$ENV_FILE\"
              \$SUDO sed -i '/^KV_REST_API_TOKEN=/d' \"\$ENV_FILE\"
              if grep -q '^REDIS_URL=' \"\$ENV_FILE\"; then
                \$SUDO sed -i 's#^REDIS_URL=.*#REDIS_URL=redis://127.0.0.1:6379/0#' \"\$ENV_FILE\"
              else
                printf '\nREDIS_URL=redis://127.0.0.1:6379/0\n' | \$SUDO tee -a \"\$ENV_FILE\" >/dev/null
              fi
            fi

            echo '>>> Restarting container...'
            podman stop audit-admin 2>/dev/null || true
            podman rm audit-admin 2>/dev/null || true
            podman run -d \
              --name audit-admin \
              --network host \
              --env-file /root/audit-admin.env \
              --restart=always \
              audit-admin:latest

            echo '>>> Waiting for startup...'
            sleep 5

            echo '>>> Health check...'
            STATUS=\$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3003/api/health)
            if [ \"\$STATUS\" = '200' ]; then
              echo 'Deploy OK - health check passed'

              echo '>>> Pruning old images (keep <24h, latest, rollback)...'
              # 只清 24h 之前未被使用的镜像，避免吃满系统盘
              # latest 正在被容器引用、rollback 一般 < 24h，都不会被误删
              podman image prune -a -f --filter 'until=24h' || true
              echo '>>> Disk usage after prune:'
              df -h / | tail -1
            else
              echo \"Health check FAILED (status=\$STATUS), rolling back...\"
              podman stop audit-admin 2>/dev/null || true
              podman rm audit-admin 2>/dev/null || true
              podman run -d \
                --name audit-admin \
                --network host \
                --env-file /root/audit-admin.env \
                --restart=always \
                audit-admin:rollback
              echo 'Rolled back to previous image'
              exit 1
            fi"
