name: CI / CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: Lint admin
        run: npm run lint:admin

      - name: Test admin
        run: npm run test

      - name: Verify semantic regression cases
        run: npm run verify:semantic-cases

      - name: Build admin
        run: npm run build:admin

  deploy:
    needs: admin
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.ECS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync code to ECS
        run: |
          APP_DIR="${{ secrets.ECS_APP_DIR }}"
          ssh "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}" "mkdir -p \"$APP_DIR\""
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            -czf - . \
            | ssh "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}" "tar -xzf - -C \"$APP_DIR\""

      - name: Deploy to ECS
        run: |
          APP_DIR="${{ secrets.ECS_APP_DIR }}"
          ssh "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}" "set -e
            cd \"$APP_DIR\"

            echo '>>> Tagging current image as rollback...'
            podman tag audit-admin:latest audit-admin:rollback 2>/dev/null || true

            echo '>>> Building new image...'
            podman build -t audit-admin:latest -f apps/admin/Dockerfile .

            echo '>>> Ensuring local Redis container...'
            podman volume exists audit-redis-data || podman volume create audit-redis-data
            podman pod exists audit-admin-pod || podman pod create --name audit-admin-pod -p 127.0.0.1:3003:3003
            if podman container exists audit-redis; then
              podman start audit-redis 2>/dev/null || true
            else
              podman run -d \
                --pod audit-admin-pod \
                --name audit-redis \
                -v audit-redis-data:/data \
                docker.m.daocloud.io/library/redis:7-alpine \
                redis-server --appendonly yes
            fi

            echo '>>> Restarting container...'
            podman stop audit-admin 2>/dev/null || true
            podman rm audit-admin 2>/dev/null || true
            podman run -d \
              --pod audit-admin-pod \
              --name audit-admin \
              --env-file /root/audit-admin.env \
              -e REDIS_URL=redis://127.0.0.1:6379/0 \
              --restart=always \
              audit-admin:latest

            echo '>>> Waiting for startup...'
            sleep 8

            echo '>>> Health check...'
            STATUS=\$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3003/api/health)
            KNOWLEDGE_STATUS=\$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3003/api/knowledge/summary)
            if [ \"\$STATUS\" = '200' ] && [ \"\$KNOWLEDGE_STATUS\" = '200' ]; then
              echo 'Deploy OK - health and knowledge checks passed'
            else
              echo \"Health check FAILED (health=\$STATUS knowledge=\$KNOWLEDGE_STATUS), rolling back...\"
              podman stop audit-admin 2>/dev/null || true
              podman rm audit-admin 2>/dev/null || true
              podman run -d \
                --pod audit-admin-pod \
                --name audit-admin \
                --env-file /root/audit-admin.env \
                -e REDIS_URL=redis://127.0.0.1:6379/0 \
                --restart=always \
                audit-admin:rollback
              echo 'Rolled back to previous image'
              exit 1
            fi"
